<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Monitor Centralizado IoT</title>
    <meta http-equiv="refresh" content="5">
    <style>
        /* Paleta "Abyssal Void": Diseñada para cero fatiga visual nocturna */
        body {
            background-color: #0b0712; /* El vacío mismo: un negro con un tinte sutilísimo de morado */
            color: #a9b1d6; /* Texto estándar en gris claro */
            font-family: 'Courier New', Courier, monospace;
            padding: 30px;
        }

        #titulo-central {
            color: #b39ddb; /* Morado pastel muy tenue para el título principal */
            text-align: center;
            margin-bottom: 40px;
            letter-spacing: 2px;
            text-shadow: 0px 0px 8px rgba(179, 157, 219, 0.2);
        }

        #panel-controles {
            border: 1px solid #1c122c; /* Borde morado oscuro lineal */
            background-color: #110a1c; /* Un paso arriba del vacío, morado de medianoche ultra oscuro */
            padding: 25px;
            margin-bottom: 25px;
            box-shadow: 0px 4px 20px rgba(0,0,0,0.5);
        }

        #etiqueta-activacion {
            color: #41a75e; /* Verde esmeralda vivo pero mate, no neón [cite: 17] */
            font-weight: bold;
            display: block;
            margin-bottom: 15px;
        }

        #led_seleccionado {
            background-color: #0b0712;
            color: #a9b1d6;
            border: 1px solid #2a1b40;
            padding: 6px;
            font-family: inherit;
        }

        /* Botones sin clases utilizando selectores id únicos para cumplir pauta [cite: 17, 22] */
        #btn-encender {
            background-color: #110a1c;
            color: #41a75e; /* Verde esmeralda [cite: 17] */
            border: 1px solid #41a75e;
            padding: 8px 18px;
            cursor: pointer;
            font-weight: bold;
            font-family: inherit;
            margin-left: 10px;
            transition: background-color 0.2s;
        }
        #btn-encender:hover { background-color: #1a3a22; }

        #btn-apagar {
            background-color: #110a1c;
            color: #f7768e; /* Coral sutil para el apagado [cite: 17] */
            border: 1px solid #f7768e;
            padding: 8px 18px;
            cursor: pointer;
            font-weight: bold;
            font-family: inherit;
            margin-left: 5px;
            transition: background-color 0.2s;
        }
        #btn-apagar:hover { background-color: #4a1d26; }

        /* Monitor estilo terminal exigido por la pauta [cite: 17] */
        #cuadro-monitor {
            border: 1px solid #41a75e;
            background-color: #07040d; /* El fondo más oscuro del sistema: el vacío absoluto */
            padding: 20px;
            height: 280px;
            overflow-y: auto;
            color: #41a75e; /* Letras verde esmeralda mate */
            box-shadow: inset 0px 0px 15px rgba(0,0,0,0.9);
        }

        #linea-log {
            margin: 5px 0;
            line-height: 1.4;
        }
    </style>
</head>
<body>

    <h1 id="titulo-central">MONITOR CENTRALIZADO IoT</h1>

    <div id="panel-controles">
        <span id="etiqueta-activacion">Controles de Activación</span>
        
        <form action="/enviar_comando" method="POST">
            <label for="led_seleccionado">Seleccionar LED: </label>
            <select name="led_seleccionado" id="led_seleccionado">
                <option value="LED 1 (Rojo)" {% if estado.led_seleccionado == 'LED 1 (Rojo)' %}selected{% endif %}>LED 1 (Rojo)</option>
                <option value="LED 2 (Amarillo)" {% if estado.led_seleccionado == 'LED 2 (Amarillo)' %}selected{% endif %}>LED 2 (Amarillo)</option>
                <option value="LED 3 (Verde)" {% if estado.led_seleccionado == 'LED 3 (Verde)' %}selected{% endif %}>LED 3 (Verde)</option>
            </select>

            <button type="submit" name="accion" value="ENCENDER" id="btn-encender">ENCENDER</button>
            <button type="submit" name="accion" value="APAGADO" id="btn-apagar">APAGAR</button>
        </form>
    </div>

    <div id="cuadro-monitor">
        {% for log in estado.historial %}
            <p id="linea-log">&gt;&gt; {{ log }}</p>
        {% else %}
            <p id="linea-log">&gt;&gt; [SISTEMA]: En línea. Último comando registrado: {{ estado.ultimo_comando }}</p>
        {% endfor %}
    </div>

</body>
</html>
